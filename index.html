function makeSVGImg(color,cb){
  const svg=CAPY_SVG_TMPL.replace(/__COLOR__/g,color)
  const blob=new Blob([svg],{type:'image/svg+xml'})
  const url=URL.createObjectURL(blob)
  const img=new Image()
  img.onload=()=>{ cb(img); URL.revokeObjectURL(url) }
  img.src=url
}

// ─── PARTICLES ───
const parts=[]
function spark(x,y,col,n=12){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*6
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-3,life:24,max:24,col,sz:3+Math.random()*4})
  }
}
function tickParts(){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.25;p.life--
    if(p.life<=0)parts.splice(i,1)
  }
}
function drawParts(){
  for(const p of parts){
    cx.globalAlpha=p.life/p.max
    cx.fillStyle=p.col
    cx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz)
  }
  cx.globalAlpha=1
}

// ─── FLYING KAPI HAZARDS ───
const KAPI_COLORS=['#FF44AA','#44FFEE','#FFEE22','#FF6622','#AA44FF']
const kapiImgs={}
KAPI_COLORS.forEach(c=>makeSVGImg(c,img=>kapiImgs[c]=img))

const kapis=[]
let kapiSpawnTimer=0

function spawnKapi(){
  const col=KAPI_COLORS[Math.floor(Math.random()*KAPI_COLORS.length)]
  const edge=Math.floor(Math.random()*3)  // top, left, right only (not floor)
  let x,y,vx,vy
  if(edge===0){x=60+Math.random()*(VW-120);y=-28;vx=(Math.random()-.5)*6;vy=2.5+Math.random()*3.5}
  else if(edge===1){x=-28;y=20+Math.random()*(GY-60);vx=2.5+Math.random()*3.5;vy=(Math.random()-.5)*5}
  else{x=VW+28;y=20+Math.random()*(GY-60);vx=-(2.5+Math.random()*3.5);vy=(Math.random()-.5)*5}
  kapis.push({x,y,vx,vy,col,angle:Math.random()*Math.PI*2,spin:(Math.random()-.5)*0.18,life:480})
}

function tickKapis(){
  kapiSpawnTimer++
  if(gState==='FIGHT'&&kapiSpawnTimer>=110&&kapis.length<6){
    spawnKapi(); kapiSpawnTimer=0
  }
  for(let i=kapis.length-1;i>=0;i--){
    const k=kapis[i]
    k.x+=k.vx; k.y+=k.vy; k.angle+=k.spin; k.life--
    // bounce off side walls and ceiling
    if(k.x<0){k.x=0;k.vx=Math.abs(k.vx)}
    if(k.x>VW){k.x=VW;k.vx=-Math.abs(k.vx)}
    if(k.y<0){k.y=0;k.vy=Math.abs(k.vy)}
    // despawn below floor or expired
    if(k.y>GY+40||k.life<=0){kapis.splice(i,1);continue}
    // hit detection vs fighters
    if(gState!=='FIGHT') continue
    for(const f of [f1,f2]){
      if(f.state==='ko'||f.hitStop>4) continue
      const dx=k.x-f.x, dy=k.y-(GY+f.y-74)
      if(Math.abs(dx)<48&&Math.abs(dy)<68){
        f.hp=Math.max(0,f.hp-7)
        f.hitStop=10; f.hitFlash=10
        if(f.state!=='block'){f.state='hurt';f.stTimer=14;f.vy=-3}
        spark(k.x,k.y,k.col,16)
        shake=6
        announce('KAPI!',k.col,45,false)
        kapis.splice(i,1)
        break
      }
    }
  }
}

function drawKapis(){
  for(const k of kapis){
    const img=kapiImgs[k.col]
    if(!img) continue
    cx.save()
    cx.translate(k.x,k.y); cx.rotate(k.angle)
    cx.globalAlpha=Math.min(1,k.life/40)
    cx.shadowColor=k.col; cx.shadowBlur=18
    cx.drawImage(img,-20,-20,40,40)
    cx.shadowBlur=0
    cx.restore()
  }
  cx.globalAlpha=1
}

// ─── ANNOUNCER ───
const anns=[]
function announce(txt,col,dur,big){
  col=col||'#FFD700'; dur=dur||90; big=big!==false
  anns.push({txt,col,dur,max:dur,big})
}
function tickAnns(){ for(let i=anns.length-1;i>=0;i--){anns[i].dur--;if(anns[i].dur<=0)anns.splice(i,1)} }
function drawAnns(){
  for(const a of anns){
    const t=a.dur/a.max, sz=a.big?52:22
    cx.save()
    cx.globalAlpha=Math.min(1,t*4)*Math.min(1,(1-t)*6)
    cx.translate(VW/2,VH/2-10); cx.scale(1+(1-t)*0.25,1+(1-t)*0.25)
    cx.font=sz+'px '+FONT; cx.textAlign='center'; cx.textBaseline='middle'
    cx.fillStyle='#000'; cx.fillText(a.txt,3,3)
    cx.fillStyle=a.col; cx.fillText(a.txt,0,0)
    cx.restore()
  }
}

// ─── TEXT REFLOW BACKGROUND ───
// Row color palettes — visible base, vivid accent
const ROW_DIM =['#1A6A38','#0E4A6E','#42186A','#6A4010','#0E5E58','#4E4A10','#6A1038','#104A6A']
const ROW_HI  =['#44FFB0','#30EEFF','#CC55FF','#FFE040','#FF55AA','#55FF66','#FFB040','#44CCFF']

// Return x-range blocked by one ellipse at scanline y; null if y misses
function ellipseXRange(ecx,ecy,erx,ery,y){
  const dy=y-ecy
  if(Math.abs(dy)>=ery) return null
  const dx=erx*Math.sqrt(1-(dy*dy)/(ery*ery))
  return [Math.max(0,ecx-dx),Math.min(VW,ecx+dx)]
}

function getAvailRanges(ly,lh,fighters){
  const mid=ly+lh*0.5
  const blocked=[]
  for(const f of fighters){
    if(!f||f.state==='ko') continue
    const fy=GY+f.y
    const pad=f.hitFlash>0?18:4
    const CW=148,CH=148
    // Body ellipse — wide oval in middle of character
    const b=ellipseXRange(f.x, fy-CH*0.44, CW*0.40+pad, CH*0.36+pad, mid)
    if(b) blocked.push(b)
    // Head ellipse — smaller, offset toward facing direction
    const hx=f.x+f.facing*CW*0.20
    const h=ellipseXRange(hx, fy-CH*0.80, CW*0.22+pad, CH*0.22+pad, mid)
    if(h) blocked.push(h)
  }
  blocked.sort((a,b)=>a[0]-b[0])
  // merge overlapping intervals
  const merged=[]
  for(const seg of blocked){
    if(merged.length&&seg[0]<=merged[merged.length-1][1])
      merged[merged.length-1][1]=Math.max(merged[merged.length-1][1],seg[1])
    else merged.push([...seg])
  }
  const avail=[]; let cur=0
  for(const [b0,b1] of merged){
    if(cur<b0-1) avail.push([cur,b0-1])
    cur=Math.max(cur,b1+1)
  }
  if(cur<VW) avail.push([cur,VW])
  return avail
}

let txtDrift=0  // advances each frame for living-text effect

function drawTextBG(){
  cx.fillStyle='#030710'
  cx.fillRect(0,0,VW,VH)

  if(!wordWidths) return  // wait for font

  const FS=8, LH=12, N=WORDS.length
  cx.font=WW_FONT

  const drift=txtDrift|0

  for(let y=0; y<GY-2; y+=LH){
    const row=Math.floor(y/LH)
    const ranges=getAvailRanges(y,LH,[f1,f2])
    const dimC=ROW_DIM[row%8]
    const hiC =ROW_HI[row%8]
    // each row starts at a pseudo-random offset based on row index + global drift
    let wi=(row*41+drift)%N

    cx.fillStyle=dimC
    for(const [x0,x1] of ranges){
      let px=x0+2
      const maxX=x1-2
      let guard=0
      while(px<maxX && guard++<800){
        const idx=wi%N; wi++
        const tw=wordWidths[idx]
        if(px+tw>maxX) break
        if(idx%7===0){
          cx.fillStyle=hiC
          cx.fillText(WORDS[idx],px,y+FS)
          cx.fillStyle=dimC
        } else {
          cx.fillText(WORDS[idx],px,y+FS)
        }
        px+=tw
      }
    }
  }

  // Also fill below GY with dimmer text (floor zone)
  cx.globalAlpha=0.22
  cx.fillStyle='#030710'; cx.fillRect(0,GY,VW,VH-GY)
  cx.globalAlpha=1

  // Floor glow line
  const fl=cx.createLinearGradient(0,GY-1,0,GY+3)
  fl.addColorStop(0,'rgba(160,60,255,0.8)')
  fl.addColorStop(1,'rgba(80,0,200,0.0)')
  cx.fillStyle=fl; cx.fillRect(0,GY-1,VW,4)

  // Scanline shimmer overlay (every other row, very subtle)
  cx.fillStyle='rgba(0,0,0,0.10)'
  for(let y=1; y<GY; y+=LH) cx.fillRect(0,y,VW,6)

  // Advance drift — 1 word index every 2 frames, gives slow living-text crawl
  if(gTimer%2===0) txtDrift=(txtDrift+1)%N
}

// ─── DRAW CAPY FIGHTER (official SVG + fighting poses) ───
function drawCapy(px,py,facing,state,phase,colors,hitFlash){
  const img=colors===P1C?capyImg1:capyImg2
  const CW=148, CH=148

  cx.save()
  cx.translate(px,py)
  cx.scale(facing,1)

  if(hitFlash>0&&Math.floor(hitFlash/2)%2===0) cx.filter='brightness(5)'

  // Ground shadow
  cx.fillStyle='rgba(0,0,0,0.40)'
  cx.beginPath(); cx.ellipse(0,-2,46,11,0,0,Math.PI*2); cx.fill()

  let bobY=0, scX=1, scY=1, pE=0, kE=0, tiltRad=0, koMode=false

  if(state==='idle')    bobY=Math.sin(phase*.09)*5
  if(state==='walk')    bobY=Math.abs(Math.sin(phase*.25))*6
  if(state==='crouch')  { scY=0.80; scX=1.08 }
  if(state==='block')   { scX=0.88; tiltRad=0.18 }
  if(state==='punch_l') pE=phase<6?phase*9:Math.max(0,54-(phase-6)*9)
  if(state==='punch_h') pE=phase<8?phase*8:Math.max(0,64-(phase-8)*8)
  if(state==='kick_l')  kE=phase<6?phase*9:Math.max(0,54-(phase-6)*9)
  if(state==='kick_h')  kE=phase<9?phase*9:Math.max(0,81-(phase-9)*9)
  if(state==='special') { pE=60; kE=40; bobY=-10 }
  if(state==='hurt')    { tiltRad=-0.22; bobY=8 }
  if(state==='ko')      { koMode=true }
  if(state==='win')     bobY=Math.sin(phase*.12)*12-10

  if(koMode){
    cx.rotate(Math.PI*0.48); cx.translate(0,-30)
    if(img) cx.drawImage(img,-CW/2,-CH/2,CW,CH)
    for(let i=0;i<3;i++){
      const a=phase*.08+i*2.1
      cx.fillStyle='#FFD700'; cx.font='bold 16px serif'; cx.textAlign='center'
      cx.fillText('★',Math.cos(a)*30,-CH*.4+Math.sin(a)*12)
    }
    cx.restore(); return
  }

  cx.rotate(tiltRad); cx.scale(scX,scY)

  // Punch arm (front side of flipped SVG is at -CW*0.32 in local space)
  if(pE>8){
    cx.fillStyle=colors.body; cx.save()
    cx.translate(-CW*0.32,-CH*0.50+bobY)
    cx.beginPath(); cx.roundRect(-pE-20,-9,pE+20,18,[5]); cx.fill()
    cx.fillStyle=colors.dark
    cx.beginPath(); cx.roundRect(-pE-36,-14,22,26,[6]); cx.fill()
    cx.strokeStyle=colors.body; cx.lineWidth=2
    for(let i=0;i<3;i++){cx.beginPath();cx.moveTo(-pE-17-i*5,-8);cx.lineTo(-pE-17-i*5,6);cx.stroke()}
    cx.restore()
  }

  // Kick leg (front side)
  if(kE>10){
    cx.fillStyle=colors.body; cx.save()
    cx.translate(-CW*0.12,-CH*0.22+bobY); cx.rotate(0.42)
    cx.beginPath(); cx.roundRect(-kE-18,-9,kE+18,20,[5]); cx.fill()
    cx.fillStyle=colors.dark
    cx.beginPath(); cx.roundRect(-kE-36,-14,26,22,[4]); cx.fill()
    cx.restore()
  }

  // Capy SVG body (SVG is left-facing by default, flip to match facing direction)
  if(img){
    cx.save(); cx.scale(-1,1)
    cx.drawImage(img,-CW/2,-CH-bobY,CW,CH)
    cx.restore()
  }

  // Special aura
  if(state==='special'){
    const ac=['#FFD700','#FF6600','#AA00FF']
    for(let i=0;i<3;i++){
      cx.strokeStyle=ac[i]; cx.lineWidth=3-i*.5; cx.globalAlpha=.5-i*.12
      cx.beginPath(); cx.ellipse(0,-CH/2-bobY,58+i*14,68+i*14,0,0,Math.PI*2); cx.stroke()
    }
    cx.globalAlpha=1
    const ag=cx.createRadialGradient(0,-CH/2,10,0,-CH/2,80)
    ag.addColorStop(0,'rgba(255,200,0,0.25)'); ag.addColorStop(1,'transparent')
    cx.fillStyle=ag; cx.beginPath(); cx.ellipse(0,-CH/2,80,80,0,0,Math.PI*2); cx.fill()
  }

  // Win sparkles
  if(state==='win'&&phase%6<3){
    const stars=['★','✦','✧']
    cx.font='18px serif'; cx.textAlign='center'; cx.fillStyle='#FFD700'
    for(let i=0;i<3;i++){
      const a=phase*.07+i*2.1
      cx.fillText(stars[i%3],Math.cos(a)*55,-CH-20+Math.sin(a)*20)
    }
  }

  cx.restore()
}

// ─── FIGHTER OBJECTS ───
function mkFighter(x,facing,colors,isAI){
  return {x,y:0,vy:0,onGround:true,facing,state:'idle',stTimer:0,phase:0,
          hp:100,maxHp:100,special:0,hitFlash:0,hitStop:0,isAI,colors,
          comboTxt:'',comboTimer:0,wins:0,_hitLanded:false}
}
f1=mkFighter(220,1,P1C,false)
f2=mkFighter(740,-1,P2C,true)
let shake=0

// ─── GAME STATE ───
let gState='INTRO', gTimer=0, round=1, roundTimer=3600

// ─── ATTACK DATA ───
const ATK={
  punch_l:{dur:18,ast:4,aen:10,range:70, dmg:8, kbx:5,kby:-1, col:'#FFD700'},
  punch_h:{dur:26,ast:7,aen:13,range:80, dmg:14,kbx:8,kby:-3, col:'#FF8800'},
  kick_l: {dur:22,ast:5,aen:12,range:85, dmg:10,kbx:6,kby:-1, col:'#FF4444'},
  kick_h: {dur:32,ast:9,aen:16,range:95, dmg:20,kbx:10,kby:-5,col:'#FF0044'},
  special:{dur:42,ast:10,aen:20,range:110,dmg:30,kbx:14,kby:-8,col:'#AA00FF'},
}
const NEUTRAL=['idle','walk','crouch','jump','block']
function isN(s){return NEUTRAL.includes(s)}
function getFacing(a,b){return a.x<b.x?1:-1}
function tryAtk(f,atk){
  if(!isN(f.state)&&f.state!=='jump') return
  if(atk==='special'&&f.special<100) return
  f.state=atk; f.stTimer=0; f.phase=0
  if(atk==='special'){f.special=0; shake=8}
}

// ─── PHYSICS ───
function physics(f){
  if(!f.onGround){f.vy+=0.6; f.y+=f.vy}
  if(f.y>=0){f.y=0;f.vy=0;f.onGround=true}
  f.x=Math.max(55,Math.min(VW-55,f.x))
}

// ─── UPDATE FIGHTER ───
function updateFighter(f,opp,inp){
  if(f.hitStop>0){f.hitStop--;return}
  f.phase++; f.hitFlash=Math.max(0,f.hitFlash-1)
  if(isN(f.state)) f.facing=getFacing(f,opp)
  const atk=ATK[f.state]
  if(atk){
    f.stTimer++; f.phase=f.stTimer
    if(f.stTimer>=atk.ast&&f.stTimer<=atk.aen&&!f._hitLanded){
      const dist=Math.abs(f.x-opp.x)
      if(dist<atk.range&&isN(opp.state)){
        f._hitLanded=true
        const dmg=opp.state==='block'?Math.round(atk.dmg*.2):atk.dmg
        opp.hp=Math.max(0,opp.hp-dmg)
        if(opp.state!=='block'){
          opp.state='hurt'; opp.stTimer=0
          const dir=getFacing(f,opp)
          opp.vy=atk.kby<-3?-16:-Math.abs(atk.kby)*4
          opp.x+=atk.kbx*dir*4; opp.onGround=false
        }
        f.special=Math.min(100,f.special+12); opp.hitFlash=10
        f.hitStop=atk.ast; opp.hitStop=atk.ast
        shake=atk.kbx>7?6:3
        spark(f.x+f.facing*atk.range*.7,GY+opp.y-60,atk.col,atk===ATK.special?20:12)
        f.comboTxt='+'+dmg; f.comboTimer=60
      }
    }
    if(f.stTimer>=atk.dur){f._hitLanded=false;f.state='idle';f.stTimer=0;f.phase=0}
    return
  }
  f._hitLanded=false
  if(f.state==='hurt'){f.stTimer++;if(f.stTimer>18)f.state='idle';physics(f);return}
  if(f.state==='ko'||f.state==='win') return
  f.state='idle'
  if(!f.onGround){f.state='jump';physics(f);return}
  if(inp.block) f.state='block'
  else if(inp.down) f.state='crouch'
  else {
    if(inp.left){f.x-=3.8;f.state='walk'}
    if(inp.right){f.x+=3.8;f.state='walk'}
    if(inp.jump&&f.onGround){f.vy=-14;f.onGround=false;f.state='jump'}
    if(inp.pL)tryAtk(f,'punch_l')
    if(inp.pH)tryAtk(f,'punch_h')
    if(inp.kL)tryAtk(f,'kick_l')
    if(inp.kH)tryAtk(f,'kick_h')
    if(inp.sp)tryAtk(f,'special')
  }
  physics(f); f.special=Math.min(100,f.special+0.04)
}

// ─── AI ───
let aiT=0
function getAIInput(ai,p){
  aiT++
  const dist=Math.abs(ai.x-p.x)
  const inp={left:false,right:false,jump:false,block:false,down:false,pL:false,pH:false,kL:false,kH:false,sp:false}
  if(!isN(ai.state)) return inp
  if((p.state==='punch_l'||p.state==='kick_l')&&dist<110&&Math.random()<.35){inp.block=true;return inp}
  if(dist>180){inp[ai.x<p.x?'right':'left']=true;if(Math.random()<.012)inp.jump=true}
  else if(dist>75){
    if(aiT%20===0){
      const r=Math.random()
      if(r<.28)inp.pL=true; else if(r<.52)inp.kL=true
      else if(r<.72)inp.pH=true; else if(r<.88)inp.kH=true
      else inp.sp=ai.special>=100
    }
    if(Math.random()<.018)inp[ai.x<p.x?'right':'left']=true
  } else {
    inp[ai.x>p.x?'right':'left']=true
  }
  return inp
}

function getP1Input(){
  return {
    left:K['KeyA']||K['ArrowLeft'],right:K['KeyD']||K['ArrowRight'],
    jump:K['KeyW']||K['ArrowUp'],down:K['KeyS']||K['ArrowDown'],
    block:K['ShiftLeft']||K['ShiftRight'],
    pL:K['KeyJ'],pH:K['KeyK'],kL:K['KeyL'],kH:K['KeyI'],
    sp:K['KeyU']||K['Space'],
  }
}

// ─── HUD ───
function drawHUD(){
  const bW=320, bH=20, bY=12, p1x=12, p2x=VW-12-bW
  // Semi-transparent backdrop for readability over text bg
  cx.fillStyle='rgba(3,7,16,0.72)'
  cx.fillRect(p1x-4,bY-4,bW+8,bH+36)
  cx.fillRect(p2x-4,bY-4,bW+8,bH+36)
  cx.fillRect(VW/2-80,bY-4,160,bH+36)

  function hpBar(x,hp,maxHp,rtl,name){
    const pct=hp/maxHp, bx=rtl?x+bW*(1-pct):x
    cx.fillStyle='#100020'; cx.fillRect(x,bY,bW,bH)
    cx.strokeStyle='#7700BB'; cx.lineWidth=2; cx.strokeRect(x,bY,bW,bH)
    const g=cx.createLinearGradient(bx,0,bx+bW*pct,0)
    if(pct>.5){g.addColorStop(0,'#00BB00');g.addColorStop(1,'#33FF77')}
    else if(pct>.2){g.addColorStop(0,'#BB9900');g.addColorStop(1,'#FFDD22')}
    else{g.addColorStop(0,'#BB0000');g.addColorStop(1,'#FF2222')}
    cx.fillStyle=g; cx.fillRect(bx,bY,bW*pct,bH)
    cx.font='9px '+FONT; cx.fillStyle='#FFD700'
    cx.textAlign=rtl?'right':'left'
    cx.fillText(name,rtl?x+bW-4:x+4,bY+bH+13)
    cx.font='7px '+FONT; cx.fillStyle='#999'
    cx.fillText(Math.ceil(hp)+'%',rtl?x+4:x+bW-4,bY+bH+13)
  }
  hpBar(p1x,f1.hp,f1.maxHp,false,f1.colors.name)
  hpBar(p2x,f2.hp,f2.maxHp,true,f2.colors.name)

  cx.font='9px '+FONT; cx.textAlign='center'; cx.fillStyle='#CC88FF'
  cx.fillText('ROUND '+round,VW/2,bY+14)
  for(let i=0;i<3;i++){
    cx.fillStyle=i<f1.wins?'#FFD700':'#1A0033'
    cx.beginPath();cx.arc(VW/2-55+i*18,bY+26,5,0,Math.PI*2);cx.fill()
    cx.fillStyle=i<f2.wins?'#FFD700':'#1A0033'
    cx.beginPath();cx.arc(VW/2+55-i*18,bY+26,5,0,Math.PI*2);cx.fill()
  }

  const secs=Math.ceil(roundTimer/60)
  cx.font='20px '+FONT; cx.textAlign='center'
  cx.fillStyle='#000'; cx.fillText(secs,VW/2+2,bY+bH+1)
  cx.fillStyle=secs<=10?'#FF4444':'#FFD700'; cx.fillText(secs,VW/2,bY+bH-1)

  function spMeter(x,sp,rtl){
    const mW=180,mH=8,mY=bY+bH+22
    cx.fillStyle='#060010'; cx.fillRect(x,mY,mW,mH)
    cx.strokeStyle='#4400AA'; cx.lineWidth=1; cx.strokeRect(x,mY,mW,mH)
    const mg=cx.createLinearGradient(x,0,x+mW,0)
    mg.addColorStop(0,'#6600DD'); mg.addColorStop(1,'#DD00AA')
    cx.fillStyle=mg; cx.fillRect(x,mY,mW*(sp/100),mH)
    cx.font='6px '+FONT; cx.textAlign=rtl?'right':'left'; cx.fillStyle='#9955FF'
    cx.fillText(sp>=100?'MAX!':'POWER',rtl?x+mW-2:x+2,mY+mH+9)
  }
  spMeter(p1x+4,f1.special,false)
  spMeter(p2x+bW-184,f2.special,true)

  for(const f of [f1,f2]){
    if(f.comboTimer>0){
      f.comboTimer--
      cx.save(); cx.globalAlpha=Math.min(1,f.comboTimer/30)
      cx.font='14px '+FONT; cx.textAlign='center'
      cx.fillStyle='#000'; cx.fillText(f.comboTxt,f.x+2,GY+f.y-155)
      cx.fillStyle='#FFD700'; cx.fillText(f.comboTxt,f.x,GY+f.y-157)
      cx.restore()
    }
  }

  if(gTimer<360){
    cx.save(); cx.globalAlpha=(360-gTimer)/360*.6
    cx.fillStyle='rgba(3,7,16,0.7)'; cx.fillRect(0,VH-28,VW,28)
    cx.font='6px '+FONT; cx.textAlign='left'; cx.fillStyle='#AA99CC'
    cx.fillText('WASD / Arrows = move+jump+crouch    J K = punch    L I = kick    U / Space = SPECIAL (need full power)    Shift = block',10,VH-8)
    cx.restore()
  }
}

// ─── ROUND MANAGEMENT ───
function resetFighters(){
  for(const f of [f1,f2]){
    f.x=f===f1?220:740; f.y=0; f.vy=0; f.onGround=true
    f.hp=100; f.special=0; f.state='idle'; f.stTimer=0
    f.hitStop=0; f.hitFlash=0; f._hitLanded=false
  }
  parts.length=0; kapis.length=0; kapiSpawnTimer=0
}
function checkKO(){
  const d1=f1.hp<=0, d2=f2.hp<=0
  if(!d1&&!d2) return
  gState='KO_FREEZE'
  if(d1){f1.state='ko';f2.state='win';f2.wins++}
  if(d2){f2.state='ko';f1.state='win';f1.wins++}
  if(d1&&d2){f1.state='ko';f2.state='ko';f1.wins--;f2.wins--}
  announce('K.O.!','#FF2222',130,true)
  shake=14; spark(VW/2,GY-60,'#FF4400',22)
  setTimeout(nextRound,2400)
}
function checkTimeout(){
  if(roundTimer-->0) return
  gState='KO_FREEZE'
  announce('TIME!!','#FF8800',110)
  if(f1.hp>f2.hp){f1.state='win';f2.state='ko';f1.wins++}
  else if(f2.hp>f1.hp){f2.state='win';f1.state='ko';f2.wins++}
  else{f1.state='win';f2.state='win'}
  setTimeout(nextRound,2400)
}
function nextRound(){
  if(f1.wins>=2||f2.wins>=2){
    gState='GAME_OVER'
    announce(f1.wins>=2?'P1 WINS!':'P2 WINS!','#FFD700',400)
  } else {
    round++; resetFighters(); gState='INTRO'; gTimer=0
    announce('ROUND '+round,'#FFD700',90)
    setTimeout(()=>announce('FIGHT!','#FF3333',80),1500)
    setTimeout(()=>{ gState='FIGHT'; roundTimer=3600 },2500)
  }
}
function initGame(){
  f1.wins=0; f2.wins=0; round=1; resetFighters()
  gState='INTRO'; gTimer=0
  announce('ROUND 1','#FFD700',90)
  setTimeout(()=>announce('FIGHT!','#FF3333',80),1500)
  setTimeout(()=>{ gState='FIGHT'; roundTimer=3600 },2500)
}

// ─── MAIN LOOP ───
initGame()
function loop(){
  requestAnimationFrame(loop)
  gTimer++; tickParts(); tickAnns(); tickKapis()
  cx.save()
  if(shake>0){cx.translate((Math.random()-.5)*shake*2,(Math.random()-.5)*shake*2);shake=Math.max(0,shake-1)}
  drawTextBG()
  if(gState==='FIGHT'){
    updateFighter(f1,f2,getP1Input())
    updateFighter(f2,f1,getAIInput(f2,f1))
    checkKO(); checkTimeout()
  }
  drawKapis()
  drawCapy(f1.x,GY+f1.y,f1.facing,f1.state,f1.phase,f1.colors,f1.hitFlash)
  drawCapy(f2.x,GY+f2.y,f2.facing,f2.state,f2.phase,f2.colors,f2.hitFlash)
  drawParts(); drawHUD(); drawAnns()
  if(gState==='GAME_OVER'&&gTimer>200){
    cx.font='11px '+FONT; cx.textAlign='center'
    cx.fillStyle='rgba(255,215,0,'+(0.5+0.5*Math.sin(gTimer*.1))+')'
    cx.fillText('PRESS ENTER / SPACE TO PLAY AGAIN',VW/2,VH-28)
    if(K['Enter']||K['NumpadEnter']){gState='NONE';setTimeout(initGame,120)}
  }
  cx.restore()
}
loop()
</script>
