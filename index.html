<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HappyCapy Fighter</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; display:flex; align-items:center; justify-content:center; height:100vh; }
canvas { display:block; image-rendering:pixelated; image-rendering:crisp-edges; }
</style>
</head>
<body>
<canvas id="g"></canvas>
<script>
// ─── VIRTUAL RESOLUTION ───
const VW=960, VH=540
const cv=document.getElementById('g')
const cx=cv.getContext('2d')
function resize(){
  const s=Math.min(innerWidth/VW,innerHeight/VH)
  cv.width=VW; cv.height=VH
  cv.style.width=(VW*s)+'px'; cv.style.height=(VH*s)+'px'
}
resize(); addEventListener('resize',resize)
cx.imageSmoothingEnabled=false

// ─── CONSTANTS ───
const GY=400
const FONT='"Press Start 2P",monospace'
const P1C={body:'#C8935A',dark:'#8B5A2B',hi:'#F0C080',name:'CAPY-P1'}
const P2C={body:'#6BAFD4',dark:'#3A6FA0',hi:'#A0D4F0',name:'CAPY-P2'}

// ─── INPUT ───
const K={}
addEventListener('keydown',e=>{K[e.code]=true;if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault()})
addEventListener('keyup',  e=>{K[e.code]=false})

// ─── PARTICLES ───
const parts=[]
function spark(x,y,col,n=12){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*6
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-3,life:24,max:24,col,sz:3+Math.random()*4})
  }
}
function tickParts(){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.25;p.life--
    if(p.life<=0)parts.splice(i,1)
  }
}
function drawParts(){
  for(const p of parts){
    cx.globalAlpha=p.life/p.max; cx.fillStyle=p.col
    cx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz)
  }
  cx.globalAlpha=1
}

// ─── ANNOUNCER ───
const anns=[]
function announce(txt,col,dur,big){
  col=col||'#FFD700'; dur=dur||90; big=big!==false
  anns.push({txt,col,dur,max:dur,big})
}
function tickAnns(){ for(let i=anns.length-1;i>=0;i--){anns[i].dur--;if(anns[i].dur<=0)anns.splice(i,1)} }
function drawAnns(){
  for(const a of anns){
    const t=a.dur/a.max, sz=a.big?52:22
    cx.save()
    cx.globalAlpha=Math.min(1,t*4)*Math.min(1,(1-t)*6)
    const sc=1+(1-t)*0.25
    cx.translate(VW/2,VH/2-10); cx.scale(sc,sc)
    cx.font=sz+'px '+FONT; cx.textAlign='center'; cx.textBaseline='middle'
    cx.fillStyle='#000'; cx.fillText(a.txt,3,3)
    cx.fillStyle=a.col; cx.fillText(a.txt,0,0)
    cx.restore()
  }
}

// ─── DRAW CAPY FIGHTER ───
function drawCapy(px,py,facing,state,phase,colors,hitFlash){
  cx.save(); cx.translate(px,py); cx.scale(facing,1)
  if(hitFlash>0&&Math.floor(hitFlash/2)%2===0) cx.filter='brightness(5)'
  cx.fillStyle='rgba(0,0,0,0.3)'
  cx.beginPath(); cx.ellipse(0,-2,34,9,0,0,Math.PI*2); cx.fill()
  const {body,dark,hi}=colors
  let bY=0,crY=0,pE=0,kE=0,hurt=false,ko=false,win=false
  if(state==='idle')    bY=Math.sin(phase*.09)*4
  if(state==='walk')    bY=Math.abs(Math.sin(phase*.24))*5
  if(state==='crouch')  crY=20
  if(state==='block')   crY=8
  if(state==='punch_l') pE=phase<6?phase*8:Math.max(0,48-(phase-6)*8)
  if(state==='punch_h') pE=phase<8?phase*7:Math.max(0,56-(phase-8)*7)
  if(state==='kick_l')  kE=phase<6?phase*8:Math.max(0,48-(phase-6)*8)
  if(state==='kick_h')  kE=phase<9?phase*8:Math.max(0,72-(phase-9)*8)
  if(state==='special') { pE=55; kE=35; bY=-8 }
  if(state==='hurt')    { bY=6; pE=-10 }
  if(state==='ko')      { ko=true; crY=55; bY=18 }
  if(state==='win')     win=true
  const B=bY-crY
  const legSwing=state==='walk'?Math.sin(phase*.24)*16:0
  // back leg
  cx.fillStyle=dark; cx.beginPath()
  cx.roundRect(-22,B-22+(ko?10:0),18,28+crY*.5,[4]); cx.fill()
  // body
  cx.fillStyle=body; cx.beginPath()
  cx.roundRect(-30,B-70+crY*.3,60,52-crY*.3,[12,12,6,6]); cx.fill()
  cx.fillStyle=hi; cx.globalAlpha=.22; cx.beginPath()
  cx.roundRect(-24,B-66+crY*.3,26,18,[5]); cx.fill(); cx.globalAlpha=1
  // back arm
  cx.fillStyle=dark; cx.beginPath()
  cx.roundRect(-44,B-58,16,12,[4]); cx.fill()
  if(!ko){
    // head
    const hTilt=win?-10:0
    cx.save(); cx.translate(0,B-90); cx.rotate(hTilt*Math.PI/180)
    cx.fillStyle=body; cx.beginPath(); cx.roundRect(-22,-18,44,38,[10]); cx.fill()
    cx.fillStyle=dark
    cx.fillRect(-17,-32,12,16); cx.fillRect(5,-32,12,16)
    cx.fillStyle='#FFAAAA'
    cx.fillRect(-14,-30,6,10); cx.fillRect(8,-30,6,10)
    cx.fillStyle='#111'; cx.beginPath(); cx.arc(10,-8,5,0,Math.PI*2); cx.fill()
    cx.fillStyle='#fff'; cx.beginPath(); cx.arc(12,-10,2,0,Math.PI*2); cx.fill()
    cx.fillStyle='#5C3317'; cx.fillRect(8,4,6,5); cx.fillRect(16,4,6,5)
    if(win){cx.strokeStyle='#5C3317';cx.lineWidth=2;cx.beginPath();cx.arc(10,10,8,0,Math.PI);cx.stroke()}
    cx.restore()
  } else {
    cx.fillStyle=body; cx.beginPath(); cx.roundRect(-26,B+12,44,28,[10]); cx.fill()
    cx.fillStyle='#111'; cx.font='bold 18px '+FONT; cx.textAlign='center'
    cx.fillText('x_x',6,B+32)
  }
  // front arm with punch extension
  cx.fillStyle=body; cx.beginPath()
  cx.roundRect(22,B-60,18+Math.max(0,pE),[12,12,4,4]); cx.fill()
  if(pE>12){
    cx.fillStyle=dark; cx.beginPath()
    cx.roundRect(36+pE,B-64,14,20,[4]); cx.fill()
  }
  // front leg with kick
  cx.fillStyle=body; cx.save(); cx.translate(4,B-22); cx.rotate(legSwing*Math.PI/180)
  cx.beginPath(); cx.roundRect(0,0,18,28+crY*.4,[4]); cx.fill(); cx.restore()
  if(kE>8){
    cx.fillStyle=dark; cx.save(); cx.translate(22,B-30); cx.rotate(-0.35)
    cx.beginPath(); cx.roundRect(0,-7,kE,16,[4]); cx.fill(); cx.restore()
  }
  // special aura
  if(state==='special'){
    const ac=['#FFD700','#FF6600','#FF0000']
    for(let i=0;i<3;i++){
      cx.strokeStyle=ac[i]; cx.lineWidth=2+i; cx.globalAlpha=.4-i*.1
      cx.beginPath(); cx.ellipse(0,B-40,40+i*12,55+i*12,0,0,Math.PI*2); cx.stroke()
    }
    cx.globalAlpha=1
  }
  cx.restore()
}

// ─── FIGHTER OBJECTS ───
function mkFighter(x,facing,colors,isAI){
  return {x,y:0,vy:0,onGround:true,facing,state:'idle',stTimer:0,phase:0,
          hp:100,maxHp:100,special:0,hitFlash:0,hitStop:0,isAI,colors,
          comboTxt:'',comboTimer:0,wins:0,_hitLanded:false}
}
let f1=mkFighter(220,1,P1C,false)
let f2=mkFighter(740,-1,P2C,true)
let shake=0

// ─── GAME STATE ───
let gState='INTRO', gTimer=0, round=1, roundTimer=3600

// ─── ATTACK DATA ───
const ATK={
  punch_l:{dur:18,ast:4,aen:10,range:70, dmg:8, kbx:5,kby:-1, col:'#FFD700'},
  punch_h:{dur:26,ast:7,aen:13,range:80, dmg:14,kbx:8,kby:-3, col:'#FF8800'},
  kick_l: {dur:22,ast:5,aen:12,range:85, dmg:10,kbx:6,kby:-1, col:'#FF4444'},
  kick_h: {dur:32,ast:9,aen:16,range:95, dmg:20,kbx:10,kby:-5,col:'#FF0044'},
  special:{dur:42,ast:10,aen:20,range:110,dmg:30,kbx:14,kby:-8,col:'#AA00FF'},
}
const NEUTRAL=['idle','walk','crouch','jump','block']
function isN(s){return NEUTRAL.includes(s)}
function getFacing(a,b){return a.x<b.x?1:-1}

function tryAtk(f,atk){
  if(!isN(f.state)&&f.state!=='jump') return
  if(atk==='special'&&f.special<100) return
  f.state=atk; f.stTimer=0; f.phase=0
  if(atk==='special'){f.special=0; shake=8}
}

// ─── PHYSICS ───
function physics(f){
  if(!f.onGround){f.vy+=0.6; f.y+=f.vy}
  if(f.y>=0){f.y=0;f.vy=0;f.onGround=true}
  f.x=Math.max(55,Math.min(VW-55,f.x))
}

// ─── UPDATE FIGHTER ───
function updateFighter(f,opp,inp){
  if(f.hitStop>0){f.hitStop--;return}
  f.phase++; f.hitFlash=Math.max(0,f.hitFlash-1)
  if(isN(f.state)) f.facing=getFacing(f,opp)
  const atk=ATK[f.state]
  if(atk){
    f.stTimer++; f.phase=f.stTimer
    if(f.stTimer>=atk.ast&&f.stTimer<=atk.aen&&!f._hitLanded){
      const dist=Math.abs(f.x-opp.x)
      if(dist<atk.range&&isN(opp.state)){
        f._hitLanded=true
        const dmg=opp.state==='block'?Math.round(atk.dmg*.2):atk.dmg
        opp.hp=Math.max(0,opp.hp-dmg)
        if(opp.state!=='block'){
          opp.state='hurt'; opp.stTimer=0
          const dir=getFacing(f,opp)
          opp.vy=atk.kby<-3?-16:-Math.abs(atk.kby)*4
          opp.x+=atk.kbx*dir*4; opp.onGround=false
        }
        f.special=Math.min(100,f.special+12); opp.hitFlash=10
        f.hitStop=atk.ast; opp.hitStop=atk.ast
        shake=atk.kbx>7?6:3
        spark(f.x+f.facing*atk.range*.7,GY+opp.y-60,atk.col,atk===ATK.special?20:12)
        f.comboTxt='+'+dmg; f.comboTimer=60
      }
    }
    if(f.stTimer>=atk.dur){f._hitLanded=false;f.state='idle';f.stTimer=0;f.phase=0}
    return
  }
  f._hitLanded=false
  if(f.state==='hurt'){f.stTimer++;if(f.stTimer>18)f.state='idle';physics(f);return}
  if(f.state==='ko'||f.state==='win') return
  f.state='idle'
  if(!f.onGround){f.state='jump';physics(f);return}
  if(inp.block) f.state='block'
  else if(inp.down) f.state='crouch'
  else {
    if(inp.left){f.x-=3.8;f.state='walk'}
    if(inp.right){f.x+=3.8;f.state='walk'}
    if(inp.jump&&f.onGround){f.vy=-14;f.onGround=false;f.state='jump'}
    if(inp.pL)tryAtk(f,'punch_l')
    if(inp.pH)tryAtk(f,'punch_h')
    if(inp.kL)tryAtk(f,'kick_l')
    if(inp.kH)tryAtk(f,'kick_h')
    if(inp.sp)tryAtk(f,'special')
  }
  physics(f); f.special=Math.min(100,f.special+0.04)
}

// ─── AI ───
let aiT=0
function getAIInput(ai,p){
  aiT++
  const dist=Math.abs(ai.x-p.x)
  const inp={left:false,right:false,jump:false,block:false,down:false,pL:false,pH:false,kL:false,kH:false,sp:false}
  if(!isN(ai.state)) return inp
  if((p.state==='punch_l'||p.state==='kick_l')&&dist<110&&Math.random()<.35){inp.block=true;return inp}
  if(dist>180){inp[ai.x<p.x?'right':'left']=true;if(Math.random()<.012)inp.jump=true}
  else if(dist>75){
    if(aiT%20===0){
      const r=Math.random()
      if(r<.28)inp.pL=true; else if(r<.52)inp.kL=true
      else if(r<.72)inp.pH=true; else if(r<.88)inp.kH=true
      else inp.sp=ai.special>=100
    }
    if(Math.random()<.018)inp[ai.x<p.x?'right':'left']=true
  } else {
    inp[ai.x>p.x?'right':'left']=true
  }
  return inp
}

function getP1Input(){
  return {
    left:K['KeyA']||K['ArrowLeft'],right:K['KeyD']||K['ArrowRight'],
    jump:K['KeyW']||K['ArrowUp'],down:K['KeyS']||K['ArrowDown'],
    block:K['ShiftLeft']||K['ShiftRight'],
    pL:K['KeyJ'],pH:K['KeyK'],kL:K['KeyL'],kH:K['KeyI'],
    sp:K['KeyU']||K['Space'],
  }
}

// ─── STAGE DRAWING ───
function drawStage(){
  const sg=cx.createLinearGradient(0,0,0,VH)
  sg.addColorStop(0,'#0D0020'); sg.addColorStop(.5,'#1A0040'); sg.addColorStop(1,'#3A0060')
  cx.fillStyle=sg; cx.fillRect(0,0,VW,VH)
  cx.fillStyle='rgba(120,0,200,0.12)'; cx.beginPath()
  cx.ellipse(VW/2,190,420,190,0,0,Math.PI*2); cx.fill()
  // Columns
  for(let i=0;i<7;i++){
    const cx2=80+i*(VW-160)/6
    const cg=cx.createLinearGradient(cx2-18,0,cx2+18,0)
    cg.addColorStop(0,'#3A1050'); cg.addColorStop(.5,'#5A3090'); cg.addColorStop(1,'#3A1050')
    cx.fillStyle=cg; cx.fillRect(cx2-18,GY-260,36,260)
    cx.fillStyle='#6A40A0'; cx.fillRect(cx2-24,GY-262,48,26); cx.fillRect(cx2-24,GY-286,48,20)
  }
  // Crowd
  cx.fillStyle='rgba(20,0,40,0.92)'
  for(let i=0;i<30;i++){
    const hx=16+i*(VW-32)/29, hy=GY-252
    const hw=14+Math.sin(i*7.3)*5
    cx.beginPath(); cx.arc(hx,hy,hw*.55,0,Math.PI*2); cx.fill()
    cx.fillRect(hx-hw*.45,hy,hw*.9,56+Math.sin(i*2.1)*12)
    if(i%4===0||i%4===1){cx.fillRect(hx-hw*.9,hy+8,hw*.5,4);cx.fillRect(hx+hw*.4,hy+14,hw*.5,4)}
  }
  cx.fillStyle='rgba(160,40,255,0.07)'; cx.fillRect(0,GY-320,VW,260)
  // Spotlights
  for(let i=0;i<3;i++){
    const sx=[VW*.2,VW*.5,VW*.8][i]
    const sg2=cx.createRadialGradient(sx,0,0,sx,0,320)
    sg2.addColorStop(0,'rgba(180,100,255,0.15)'); sg2.addColorStop(1,'transparent')
    cx.fillStyle=sg2; cx.beginPath(); cx.moveTo(sx,0); cx.lineTo(sx-60,GY); cx.lineTo(sx+60,GY); cx.fill()
  }
  // Floor
  const fg=cx.createLinearGradient(0,GY,0,GY+140)
  fg.addColorStop(0,'#38006A'); fg.addColorStop(1,'#120028')
  cx.fillStyle=fg; cx.fillRect(0,GY,VW,140)
  cx.strokeStyle='rgba(180,80,255,0.18)'; cx.lineWidth=1
  for(let i=0;i<14;i++){cx.beginPath();cx.moveTo(i*(VW/13),GY);cx.lineTo(i*(VW/13),GY+140);cx.stroke()}
  cx.beginPath();cx.moveTo(0,GY+44);cx.lineTo(VW,GY+44);cx.stroke()
  cx.beginPath();cx.moveTo(0,GY+88);cx.lineTo(VW,GY+88);cx.stroke()
  cx.fillStyle='rgba(255,255,255,0.05)'; cx.fillRect(0,GY,VW,2)
  cx.font='9px '+FONT; cx.textAlign='center'; cx.fillStyle='rgba(180,120,255,0.45)'
  cx.fillText('CAPY COLOSSEUM',VW/2,GY-6)
}

// ─── HUD ───
function drawHUD(){
  const bW=320, bH=20, bY=12, p1x=12, p2x=VW-12-bW
  function hpBar(x,hp,maxHp,rtl,name){
    const pct=hp/maxHp, bx=rtl?x+bW*(1-pct):x
    cx.fillStyle='#180030'; cx.fillRect(x,bY,bW,bH)
    cx.strokeStyle='#8800CC'; cx.lineWidth=2; cx.strokeRect(x,bY,bW,bH)
    const g=cx.createLinearGradient(bx,0,bx+bW*pct,0)
    if(pct>.5){g.addColorStop(0,'#00CC00');g.addColorStop(1,'#44FF88')}
    else if(pct>.2){g.addColorStop(0,'#CCAA00');g.addColorStop(1,'#FFEE33')}
    else{g.addColorStop(0,'#CC0000');g.addColorStop(1,'#FF3333')}
    cx.fillStyle=g; cx.fillRect(bx,bY,bW*pct,bH)
    // name
    cx.font='9px '+FONT; cx.fillStyle='#FFD700'
    cx.textAlign=rtl?'right':'left'
    cx.fillText(name,rtl?x+bW-4:x+4,bY+bH+13)
    cx.font='7px '+FONT; cx.fillStyle='#999'
    cx.fillText(Math.ceil(hp)+'%',rtl?x+4:x+bW-4,bY+bH+13)
  }
  hpBar(p1x,f1.hp,f1.maxHp,false,f1.colors.name)
  hpBar(p2x,f2.hp,f2.maxHp,true,f2.colors.name)
  // Round & wins
  cx.font='9px '+FONT; cx.textAlign='center'; cx.fillStyle='#CC88FF'
  cx.fillText('ROUND '+round,VW/2,bY+14)
  for(let i=0;i<3;i++){
    cx.fillStyle=i<f1.wins?'#FFD700':'#2A0044'
    cx.beginPath();cx.arc(VW/2-55+i*18,bY+26,5,0,Math.PI*2);cx.fill()
    cx.fillStyle=i<f2.wins?'#FFD700':'#2A0044'
    cx.beginPath();cx.arc(VW/2+55-i*18,bY+26,5,0,Math.PI*2);cx.fill()
  }
  // Timer
  const secs=Math.ceil(roundTimer/60)
  cx.font='20px '+FONT; cx.textAlign='center'
  cx.fillStyle='#000'; cx.fillText(secs,VW/2+2,bY+bH+1)
  cx.fillStyle=secs<=10?'#FF4444':'#FFD700'; cx.fillText(secs,VW/2,bY+bH-1)
  // Special meters
  function spMeter(x,sp,rtl){
    const mW=180,mH=8,mY=bY+bH+22
    cx.fillStyle='#080018'; cx.fillRect(x,mY,mW,mH)
    cx.strokeStyle='#5500AA'; cx.lineWidth=1; cx.strokeRect(x,mY,mW,mH)
    const mg=cx.createLinearGradient(x,0,x+mW,0)
    mg.addColorStop(0,'#7700EE'); mg.addColorStop(1,'#EE00BB')
    cx.fillStyle=mg; cx.fillRect(x,mY,mW*(sp/100),mH)
    cx.font='6px '+FONT; cx.textAlign=rtl?'right':'left'; cx.fillStyle='#AA66FF'
    cx.fillText(sp>=100?'MAX!':'POWER',rtl?x+mW-2:x+2,mY+mH+9)
  }
  spMeter(p1x+4,f1.special,false)
  spMeter(p2x+bW-184,f2.special,true)
  // Combo popups
  for(const f of [f1,f2]){
    if(f.comboTimer>0){
      f.comboTimer--
      cx.save(); cx.globalAlpha=Math.min(1,f.comboTimer/30)
      cx.font='14px '+FONT; cx.textAlign='center'
      cx.fillStyle='#000'; cx.fillText(f.comboTxt,f.x+2,GY+f.y-155)
      cx.fillStyle='#FFD700'; cx.fillText(f.comboTxt,f.x,GY+f.y-157)
      cx.restore()
    }
  }
  // Controls
  if(gTimer<360){
    cx.save(); cx.globalAlpha=(360-gTimer)/360*.65
    cx.font='6px '+FONT; cx.textAlign='left'; cx.fillStyle='#BBAACC'
    cx.fillText('WASD+JKL = P1 MOVE/ATK',10,VH-18)
    cx.fillText('U=SPECIAL(need full power)  SHIFT=BLOCK',10,VH-6)
    cx.restore()
  }
}

// ─── ROUND MANAGEMENT ───
function resetFighters(){
  for(const f of [f1,f2]){
    f.x=f===f1?220:740; f.y=0; f.vy=0; f.onGround=true
    f.hp=100; f.special=0; f.state='idle'; f.stTimer=0
    f.hitStop=0; f.hitFlash=0; f._hitLanded=false
  }
  parts.length=0
}

function checkKO(){
  const d1=f1.hp<=0, d2=f2.hp<=0
  if(!d1&&!d2) return
  gState='KO_FREEZE'
  if(d1){f1.state='ko';f2.state='win';f2.wins++}
  if(d2){f2.state='ko';f1.state='win';f1.wins++}
  if(d1&&d2){f1.state='ko';f2.state='ko';f1.wins--;f2.wins--}
  announce('K.O.!','#FF2222',130,true)
  shake=14; spark(VW/2,GY-60,'#FF4400',22)
  setTimeout(nextRound,2400)
}

function checkTimeout(){
  if(roundTimer-->0) return
  gState='KO_FREEZE'
  announce('TIME!!','#FF8800',110)
  if(f1.hp>f2.hp){f1.state='win';f2.state='ko';f1.wins++}
  else if(f2.hp>f1.hp){f2.state='win';f1.state='ko';f2.wins++}
  else{f1.state='win';f2.state='win'}
  setTimeout(nextRound,2400)
}

function nextRound(){
  if(f1.wins>=2||f2.wins>=2){
    gState='GAME_OVER'
    announce(f1.wins>=2?'P1 WINS!':'P2 WINS!','#FFD700',400)
  } else {
    round++; resetFighters(); gState='INTRO'; gTimer=0
    announce('ROUND '+round,'#FFD700',90)
    setTimeout(()=>announce('FIGHT!','#FF3333',80),1500)
    setTimeout(()=>{ gState='FIGHT'; roundTimer=3600 },2500)
  }
}

function initGame(){
  f1.wins=0; f2.wins=0; round=1; resetFighters()
  gState='INTRO'; gTimer=0
  announce('ROUND 1','#FFD700',90)
  setTimeout(()=>announce('FIGHT!','#FF3333',80),1500)
  setTimeout(()=>{ gState='FIGHT'; roundTimer=3600 },2500)
}

// ─── MAIN LOOP ───
initGame()
function loop(){
  requestAnimationFrame(loop)
  gTimer++; tickParts(); tickAnns()
  cx.save()
  if(shake>0){cx.translate((Math.random()-.5)*shake*2,(Math.random()-.5)*shake*2);shake=Math.max(0,shake-1)}
  drawStage()
  if(gState==='FIGHT'){
    updateFighter(f1,f2,getP1Input())
    updateFighter(f2,f1,getAIInput(f2,f1))
    checkKO(); checkTimeout()
  }
  drawCapy(f1.x,GY+f1.y,f1.facing,f1.state,f1.phase,f1.colors,f1.hitFlash)
  drawCapy(f2.x,GY+f2.y,f2.facing,f2.state,f2.phase,f2.colors,f2.hitFlash)
  drawParts(); drawHUD(); drawAnns()
  if(gState==='GAME_OVER'&&gTimer>200){
    cx.font='11px '+FONT; cx.textAlign='center'
    cx.fillStyle='rgba(255,215,0,'+(0.5+0.5*Math.sin(gTimer*.1))+')'
    cx.fillText('PRESS ENTER / SPACE TO PLAY AGAIN',VW/2,VH-28)
    if(K['Enter']||K['NumpadEnter']){gState='NONE';setTimeout(initGame,120)}
  }
  cx.restore()
}
loop()
</script>
