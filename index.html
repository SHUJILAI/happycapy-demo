<title>HappyCapy Craft</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
#hint {
  position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
  font-family: 'Press Start 2P', monospace; font-size: 8px; color: #fff;
  text-shadow: 2px 2px #000; background: rgba(0,0,0,0.55);
  padding: 8px 14px; pointer-events: none; border: 2px solid #555;
  white-space: nowrap; transition: opacity 2s;
}
#hint.gone { opacity: 0; }
</style>

<body>
<canvas id="game"></canvas>
<div id="hint">WASD / ARROWS + SPACE &nbsp;|&nbsp; CLICK BLOCKS &nbsp;|&nbsp; DRAG CAPY</div>

// ═══════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════
const B = 48           // block size px
const WW = 80          // world width  (blocks)
const WH = 18          // world height (blocks)
const AIR=0,GRASS=1,DIRT=2,STONE=3,BED=4,WOOD=5,LEAF=6

const BCOL = {
  [GRASS]: { face:'#5AA83A', top:'#6ABF48', border:'#2A5010' },
  [DIRT]:  { face:'#8B5A2B', top:'#9B6A3B', border:'#4A2800' },
  [STONE]: { face:'#898989', top:'#999999', border:'#404040' },
  [BED]:   { face:'#3C3C3C', top:'#4C4C4C', border:'#111' },
  [WOOD]:  { face:'#9C6926', top:'#AC7936', border:'#5C3800' },
  [LEAF]:  { face:'#2D7B2D', top:'#3D8B3D', border:'#0D4A0D' },
}

// ═══════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════
const cv = document.getElementById('game')
const cx = cv.getContext('2d')
cx.imageSmoothingEnabled = false
function resize() { cv.width = innerWidth; cv.height = innerHeight }
resize(); addEventListener('resize', resize)

// ═══════════════════════════════════════
// WORLD
// ═══════════════════════════════════════
const terrain = Array.from({length:WH}, () => new Uint8Array(WW))
const broken  = new Set()
let blocksCollected = 0, collisionScore = 0

function genWorld() {
  const H = []
  for (let c = 0; c < WW; c++) {
    H[c] = Math.max(7, Math.min(WH-4, 10
      + Math.round(Math.sin(c*0.28)*2.2 + Math.sin(c*0.65)*1.1 + Math.sin(c*0.13)*1.8)
    ))
  }
  for (let c = 0; c < WW; c++) for (let r = 0; r < WH; r++) {
    if (r === H[c])           terrain[r][c] = GRASS
    else if (r > H[c] && r < H[c]+3) terrain[r][c] = DIRT
    else if (r >= H[c]+3 && r < WH-1) terrain[r][c] = STONE
    else if (r === WH-1)      terrain[r][c] = BED
  }
  // Trees every ~7 cols
  for (let c = 4; c < WW-4; c += 7) {
    const gh = H[c]
    if (gh < 5) continue
    terrain[gh-1][c] = WOOD; terrain[gh-2][c] = WOOD; terrain[gh-3][c] = WOOD
    for (let dr=-5; dr<=-3; dr++) for (let dc=-2; dc<=2; dc++) {
      if (gh+dr>=0 && c+dc>=0 && c+dc<WW && terrain[gh+dr][c+dc]===AIR)
        terrain[gh+dr][c+dc] = LEAF
    }
  }
  return H
}
const H = genWorld()

function solid(r, c) {
  if (c<0||c>=WW||r<0) return false
  if (r>=WH) return true
  if (broken.has(r*1000+c)) return false
  return terrain[r][c] !== AIR
}

let capyImg = null
;(()=>{
  const blob = new Blob([SVG_PATHS], {type:'image/svg+xml'})

  im.onload = () => { capyImg = im; URL.revokeObjectURL(u) }
  im.src = u
})()

// ═══════════════════════════════════════
// ENTITIES
// ═══════════════════════════════════════
const CW = B * 1.3, CH = B * 1.3   // capy size
const CR = Math.min(CW,CH) * 0.44  // billiard radius
const GRAV = 0.42, JVEL = -11.5, WSPD = 4.2
const GFRIC = 0.78, AFRIC = 0.97
// Billiard: REST=1 (perfectly elastic), FRIC keeps slowing them on ground
const REST = 1.0

function mkCapy(col, vx) {
  return { x: col*B, y: H[col]*B - CH, vx, vy:0, onGround:false, facing:vx<0?-1:1, flash:0, isDrag:false }
}
let c1 = mkCapy(5, 0)
let c2 = mkCapy(WW-9, -2.2)

// camera
let camX = c1.x - innerWidth/2, camY = 0

// ═══════════════════════════════════════
// PHYSICS
// ═══════════════════════════════════════
function stepCapy(c, isP) {
  if (c.isDrag) return
  if (!c.onGround) c.vy += GRAV
  c.vy = Math.min(c.vy, 22)
  c.onGround = false

  // X
  c.x += c.vx
  {
    const t = Math.floor(c.y/B), bo = Math.floor((c.y+CH-1)/B)
    const l = Math.floor(c.x/B), r = Math.floor((c.x+CW-1)/B)
    if (c.vx > 0 && (solid(t,r)||solid(bo,r))) { c.x = r*B-CW; c.vx *= -0.35 }
    else if (c.vx < 0 && (solid(t,l)||solid(bo,l))) { c.x = (l+1)*B; c.vx *= -0.35 }
  }

  // Y
  c.y += c.vy
  {
    const l = Math.floor(c.x/B), r = Math.floor((c.x+CW-1)/B)
    const t = Math.floor(c.y/B), bo = Math.floor((c.y+CH-1)/B)
    if (c.vy > 0 && (solid(bo,l)||solid(bo,r))) { c.y = bo*B-CH; c.vy = 0; c.onGround = true }
    else if (c.vy < 0 && (solid(t,l)||solid(t,r))) { c.y = (t+1)*B; c.vy *= 0.3 }
  }

  // world bounds
  if (c.x < 0) { c.x = 0; c.vx = Math.abs(c.vx) * REST }
  if (c.x + CW > WW*B) { c.x = WW*B-CW; c.vx = -Math.abs(c.vx) * REST }
  if (c.y + CH > WH*B) { c.y = WH*B-CH; c.vy = 0; c.onGround = true }
  if (c.y < 0) { c.y = 0; c.vy = Math.abs(c.vy)*0.5 }

  c.vx *= c.onGround ? GFRIC : AFRIC
  if (Math.abs(c.vx) > 0.1) c.facing = c.vx > 0 ? 1 : -1

  // AI: keep capy2 moving
  if (!isP && c.onGround && Math.abs(c.vx) < 0.4)
    c.vx = (Math.random()>0.5?1:-1) * (1.8+Math.random()*2.2)

  if (c.flash > 0) c.flash--
}

// Billiard collision — perfect elastic equal-mass
function billiard() {
  const ax = c1.x+CW/2, ay = c1.y+CH/2
  const bx = c2.x+CW/2, by = c2.y+CH/2
  const dx = bx-ax, dy = by-ay
  const d = Math.sqrt(dx*dx+dy*dy)
  if (d < CR*2 && d > 0.01) {
    const nx = dx/d, ny = dy/d
    const dvn = (c1.vx-c2.vx)*nx + (c1.vy-c2.vy)*ny
    if (dvn > 0) {
      const imp = dvn * (1+REST) / 2
      c1.vx -= imp*nx; c1.vy -= imp*ny
      c2.vx += imp*nx; c2.vy += imp*ny
      const sep = (CR*2 - d)/2 + 1.5
      if (!c1.isDrag) { c1.x -= sep*nx; c1.y -= sep*ny }
      if (!c2.isDrag) { c2.x += sep*nx; c2.y += sep*ny }
      c1.flash = 12; c2.flash = 12
      collisionScore += 10
      spawnPuff((ax+bx)/2, (ay+by)/2)
    }
  }
}

// ═══════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════
const parts = [], popups = []

function spawnPuff(x, y) {
  for (let i=0;i<12;i++) {
    const a = Math.random()*Math.PI*2, s = 2+Math.random()*5
    parts.push({ x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-2, life:40, max:40, col:'#FFD700', sz:5+Math.random()*5 })
  }
  popups.push({ x, y:y-20, text:'+10', life:60, max:60 })
}

function spawnBreak(bx, by, col) {
  for (let i=0;i<8;i++) {
    const a = Math.random()*Math.PI*2, s = 2+Math.random()*4
    parts.push({ x:bx, y:by, vx:Math.cos(a)*s, vy:Math.sin(a)*s-2, life:30, max:30, col, sz:4+Math.random()*4 })
  }
  blocksCollected++
}

function tickParts() {
  for (let i=parts.length-1;i>=0;i--) {
    const p = parts[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.18; p.life--
    if (p.life<=0) parts.splice(i,1)
  }
  for (let i=popups.length-1;i>=0;i--) {
    const p = popups[i]; p.y-=0.6; p.life--
    if (p.life<=0) popups.splice(i,1)
  }
}

// ═══════════════════════════════════════
// INPUT
// ═══════════════════════════════════════
const K = {}
addEventListener('keydown', e => { K[e.code]=true; if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault() })
addEventListener('keyup',   e => { K[e.code]=false })

function handleInput() {
  if (K['ArrowLeft'] ||K['KeyA']) c1.vx -= 0.9
  if (K['ArrowRight']||K['KeyD']) c1.vx += 0.9
  c1.vx = Math.max(-WSPD, Math.min(WSPD, c1.vx))
  if ((K['ArrowUp']||K['KeyW']||K['Space']) && c1.onGround) { c1.vy = JVEL; c1.onGround = false }
}

// Drag
let dragT = null, dOffX=0, dOffY=0, dPrevX=0, dPrevY=0
cv.addEventListener('mousedown', e => {
  const wx = e.clientX+camX, wy = e.clientY+camY
  for (const c of [c1, c2]) {
    if (wx>=c.x&&wx<=c.x+CW&&wy>=c.y&&wy<=c.y+CH) {
      dragT=c; dOffX=wx-c.x; dOffY=wy-c.y
      c.isDrag=true; c.vx=0; c.vy=0
      dPrevX=c.x; dPrevY=c.y; return
    }
  }
  // break block
  const bc = Math.floor(wx/B), br = Math.floor(wy/B)
  const key = br*1000+bc
  if (br>=0&&br<WH&&bc>=0&&bc<WW&&!broken.has(key)) {
    const t = terrain[br][bc]
    if (t!==AIR&&t!==BED) {
      broken.add(key)
      spawnBreak(bc*B+B/2, br*B+B/2, BCOL[t]?.face||'#888')
    }
  }
})
addEventListener('mousemove', e => {
  if (!dragT) return
  const wx = e.clientX+camX, wy = e.clientY+camY
  dPrevX=dragT.x; dPrevY=dragT.y
  dragT.x=wx-dOffX; dragT.y=wy-dOffY
})
addEventListener('mouseup', () => {
  if (!dragT) return
  dragT.vx = (dragT.x-dPrevX)*0.82
  dragT.vy = (dragT.y-dPrevY)*0.82
  dragT.isDrag=false; dragT=null
})

// Touch
cv.addEventListener('touchstart', e => {
  const t = e.touches[0]
  const wx = t.clientX+camX, wy = t.clientY+camY
  for (const c of [c1, c2]) {
    if (wx>=c.x&&wx<=c.x+CW&&wy>=c.y&&wy<=c.y+CH) {
      dragT=c; dOffX=wx-c.x; dOffY=wy-c.y
      c.isDrag=true; c.vx=0; c.vy=0; dPrevX=c.x; dPrevY=c.y; return
    }
  }
}, {passive:true})
addEventListener('touchmove', e => {
  if (!dragT) return
  const t = e.touches[0], wx=t.clientX+camX, wy=t.clientY+camY
  dPrevX=dragT.x; dPrevY=dragT.y; dragT.x=wx-dOffX; dragT.y=wy-dOffY
}, {passive:true})
addEventListener('touchend', () => {
  if (!dragT) return
  dragT.vx=(dragT.x-dPrevX)*0.82; dragT.vy=(dragT.y-dPrevY)*0.82
  dragT.isDrag=false; dragT=null
})

// ═══════════════════════════════════════
// CLOUDS
// ═══════════════════════════════════════
const clouds = Array.from({length:9}, () => ({
  x: Math.random()*WW*B,
  y: 15+Math.random()*90,
  w: 80+Math.random()*130, h: 28+Math.random()*22,
  spd: 0.18+Math.random()*0.28
}))
function tickClouds() {
  for (const cl of clouds) { cl.x += cl.spd; if (cl.x > WW*B+200) cl.x=-200 }
}

// ═══════════════════════════════════════
// DRAWING
// ═══════════════════════════════════════
let frame = 0

function drawBlock(sx, sy, type) {
  const col = BCOL[type]; if (!col) return
  cx.fillStyle = col.face; cx.fillRect(sx, sy, B, B)
  cx.fillStyle = col.top;  cx.fillRect(sx, sy, B, 5)
  // Lighter left edge
  cx.fillStyle = col.top;  cx.fillRect(sx, sy, 4, B)
  // Dark shadow edges
  cx.fillStyle = col.border; cx.fillRect(sx, sy+B-5, B, 5)
  cx.fillStyle = col.border; cx.fillRect(sx+B-5, sy, 5, B)
  // Grass top detail
  if (type===GRASS) {
    cx.fillStyle='#3D7A20'
    for (let i=0;i<4;i++) cx.fillRect(sx+4+i*10, sy+1+(i%2)*3, 3, 4)
  }
  // Leaf detail
  if (type===LEAF) {
    cx.fillStyle='rgba(0,100,0,0.3)'
    cx.fillRect(sx+5, sy+5, B-10, B-10)
  }
}

function drawCloud(cl) {
  const sx = cl.x - camX*0.25, sy = cl.y
  cx.fillStyle = '#fff'; cx.fillRect(sx, sy, cl.w, cl.h)
  cx.fillRect(sx+cl.w*0.15, sy-cl.h*0.45, cl.w*0.7, cl.h*0.6)
  cx.fillStyle = '#D8D8D8'; cx.fillRect(sx, sy+cl.h-4, cl.w, 4)
}

function drawCapy(c) {
  if (!capyImg) return
  const sx = c.x-camX, sy = c.y-camY
  cx.save(); cx.translate(sx+CW/2, sy+CH/2)
  if (c.facing < 0) cx.scale(-1,1)
  // Shadow
  cx.globalAlpha=0.25; cx.fillStyle='#000'
  cx.beginPath(); cx.ellipse(0, CH/2-2, CW*0.38, 7, 0, 0, Math.PI*2); cx.fill()
  cx.globalAlpha=1
  // Flash on collision
  if (c.flash>0 && Math.floor(c.flash/2)%2===0) cx.filter='brightness(4) sepia(1) saturate(8)'
  cx.drawImage(capyImg, -CW/2, -CH/2, CW, CH)
  cx.restore()
}

function pxText(txt, x, y, col, size=10) {
  cx.font = `${size}px "Press Start 2P", monospace`
  cx.fillStyle='#000'; cx.fillText(txt, x+2, y+2)
  cx.fillStyle=col;    cx.fillText(txt, x, y)
}

function drawUI() {
  // Score panel (top-left)
  cx.fillStyle='rgba(0,0,0,0.65)'
  cx.fillRect(8, 8, 230, 54)
  cx.strokeStyle='#666'; cx.lineWidth=2; cx.strokeRect(8, 8, 230, 54)
  pxText(`SCORE: ${collisionScore}`, 18, 28, '#FFD700', 10)
  pxText(`BLOCKS: ${blocksCollected}`, 18, 50, '#7EC8E3', 10)

  // Hearts (top-right) — decorative
  const hx = cv.width - 140
  cx.fillStyle='rgba(0,0,0,0.65)'; cx.fillRect(hx-8, 8, 140, 32)
  cx.strokeStyle='#666'; cx.lineWidth=2; cx.strokeRect(hx-8, 8, 140, 32)
  pxText('HAPPYCAPY', hx, 28, '#FF7070', 8)

  // Popup score text
  for (const p of popups) {
    cx.globalAlpha = p.life/p.max
    pxText(p.text, p.x-camX-12, p.y-camY, '#FFD700', 12)
    cx.globalAlpha=1
  }
}

// ═══════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════
function loop() {
  frame++
  handleInput()
  if (!c1.isDrag) stepCapy(c1, true)
  if (!c2.isDrag) stepCapy(c2, false)
  billiard()
  tickParts(); tickClouds()

  // Camera: follow c1 with smoothing
  const tCamX = c1.x - cv.width/2 + CW/2
  const tCamY = Math.max(0, Math.min(c1.y - cv.height*0.45, WH*B - cv.height))
  camX += (tCamX-camX)*0.1
  camY += (tCamY-camY)*0.1
  camX = Math.max(0, Math.min(camX, WW*B - cv.width))

  // ── SKY ──
  const sg = cx.createLinearGradient(0,0,0,cv.height)
  sg.addColorStop(0, '#3A78C9'); sg.addColorStop(0.55,'#87CEEB'); sg.addColorStop(1,'#C8E8FF')
  cx.fillStyle=sg; cx.fillRect(0,0,cv.width,cv.height)

  // Sun
  const sunX = cv.width*0.82, sunY = 55
  cx.fillStyle='#FFE040'; cx.fillRect(sunX-26, sunY-26, 52, 52)
  cx.fillStyle='#FFD700'; cx.fillRect(sunX-22, sunY-22, 44, 44)
  // Pixel rays
  cx.fillStyle='#FFE870'
  const rayAng = frame*0.005
  for (let i=0;i<4;i++) {
    const a=i*Math.PI/2+rayAng
    cx.fillRect(sunX+Math.cos(a)*34-4, sunY+Math.sin(a)*34-4, 8, 8)
  }

  // Clouds
  for (const cl of clouds) drawCloud(cl)

  // ── BLOCKS ──
  const c0 = Math.max(0, Math.floor(camX/B))
  const c1e = Math.min(WW-1, Math.ceil((camX+cv.width)/B))
  const r0 = Math.max(0, Math.floor(camY/B))
  const r1 = Math.min(WH-1, Math.ceil((camY+cv.height)/B))
  for (let r=r0; r<=r1; r++) for (let c=c0; c<=c1e; c++) {
    const t = terrain[r][c]
    if (t!==AIR && !broken.has(r*1000+c))
      drawBlock(c*B-camX, r*B-camY, t)
  }

  // ── PARTICLES ──
  for (const p of parts) {
    cx.globalAlpha = p.life/p.max
    cx.fillStyle = p.col
    cx.fillRect(p.x-camX-p.sz/2, p.y-camY-p.sz/2, p.sz, p.sz)
  }
  cx.globalAlpha=1

  // ── CAPYS ──
  drawCapy(c2); drawCapy(c1)

  // ── UI ──
  drawUI()

  requestAnimationFrame(loop)
}

// Fade hint
setTimeout(()=>{ const h=document.getElementById('hint'); if(h) h.classList.add('gone') }, 5000)

requestAnimationFrame(loop)
</script>
