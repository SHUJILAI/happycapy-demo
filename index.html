<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HappyCapy — Dynamic Layout</title>
<style>
* { box-sizing: border-box; }
:root {
  color-scheme: light;
  --paper:  #f5f0e6;
  --ink:    #1a1510;
  --muted:  #6b5f50;
  --rule:   #d5c9b8;
  --accent: #2a7a52;
}
html, body {
  margin: 0; height: 100%; min-height: 100%;
  background: var(--paper);
  color: var(--ink);
  font-family: Georgia, "Times New Roman", serif;
  overflow: hidden;
  cursor: default;
  overscroll-behavior: none;
}
.page {
  position: relative;
  height: 100vh;
  overflow: hidden;
  isolation: isolate;
}
.atmosphere {
  position: absolute; inset: -10%;
  pointer-events: none; z-index: 0;
  background:
    radial-gradient(50% 55% at 15% 85%, rgba(42,122,82,0.12), transparent 68%),
    radial-gradient(45% 40% at 88% 12%, rgba(180,130,60,0.13), transparent 72%),
    radial-gradient(60% 50% at 50% 50%, rgba(245,240,230,0) 0%, rgba(240,230,210,0.15) 100%);
}
.hint {
  position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
  padding: 8px 16px 9px; border-radius: 999px;
  background: rgba(26,21,16,0.88); color: rgba(245,240,230,0.95);
  font: 500 11px/1.2 "Helvetica Neue", Arial, sans-serif;
  letter-spacing: 0.02em; white-space: nowrap; pointer-events: none; z-index: 10;
  box-shadow: 0 8px 24px rgba(0,0,0,0.18);
}
#stage { position: relative; height: 100%; }
.headline { position: absolute; margin: 0; font: inherit; user-select: text; z-index: 1; }
.hl-line {
  position: absolute; white-space: pre;
  color: var(--ink); font-weight: 700; cursor: text;
}
.credit {
  position: absolute; margin: 0;
  font: 11px/14px "Helvetica Neue", Arial, sans-serif;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--muted); white-space: nowrap; z-index: 1; user-select: text;
}
.body-line {
  position: absolute; white-space: pre;
  font-weight: 400; letter-spacing: 0.005em;
  color: var(--ink); cursor: text; z-index: 1;
  transition: color 80ms;
}
.body-line:hover { color: var(--accent); }
.capy-wrap {
  position: absolute; z-index: 3;
  user-select: none; cursor: grab;
  transition: filter 0.2s;
}
.capy-wrap:active { cursor: grabbing; }
.capy-wrap:hover { filter: drop-shadow(0 0 20px rgba(42,122,82,0.4)); }
.capy-inner {
  transform-origin: center;
}
@keyframes capy-idle {
  0%, 100% { transform: translateY(0px); }
  50%       { transform: translateY(-4px); }
}
.capy-idle { animation: capy-idle 2s ease-in-out infinite; }
</style>
</head>
<body>
<main class="page" id="page">
  <div class="atmosphere"></div>
  <p class="hint" id="hint">Drag the capybara — text reflows in real time</p>
  <div id="stage"></div>
</main>

// Official icon: 144×144 square
const CAPY_ASPECT = 144 / 144

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
const stage = document.getElementById('stage')
const pageEl = document.getElementById('page')
let angle = 0
let spinFrom = 0, spinTo = 0, spinStart = 0, spinDur = 0, spinning = false
let scheduled = false
// Drag state — capy1
let dragCapyX = null, dragCapyY = null
let lastCapyX = 0, lastCapyY = 0
let isDragging = false, dragOffX = 0, dragOffY = 0, didDrag = false
let prevCapyX = 0, prevCapyY = 0
// Drag state — capy2
let capy2X = null, capy2Y = null, lastCapy2X = 0, lastCapy2Y = 0
let isDragging2 = false, dragOffX2 = 0, dragOffY2 = 0, prevCapy2X = 0, prevCapy2Y = 0
// Physics
const FRIC = 0.994, REST = 1.0
let vel1 = { x: 0, y: 0 }
let vel2 = { x: 2.4, y: 1.6 }

// DOM pool
const headlineEl = document.createElement('h1')
headlineEl.className = 'headline'
stage.appendChild(headlineEl)

const creditEl = document.createElement('p')
creditEl.className = 'credit'
creditEl.textContent = CREDIT
stage.appendChild(creditEl)

const capyWrap = document.createElement('div')
capyWrap.className = 'capy-wrap'
capyWrap.innerHTML = `<div class="capy-idle"><div class="capy-inner">${CAPY_SVG}</div></div>`
stage.appendChild(capyWrap)

const capy2Wrap = document.createElement('div')
capy2Wrap.className = 'capy-wrap'
capy2Wrap.innerHTML = `<div class="capy-idle"><div class="capy-inner" style="transform:scaleX(-1)">${CAPY_SVG}</div></div>`
stage.appendChild(capy2Wrap)

let hlPool = []
let bodyPool = []
const preparedBody = prepareWithSegments(BODY_TEXT, BODY_FONT)
const preparedCredit = prepareWithSegments(CREDIT, '11px "Helvetica Neue", Arial, sans-serif')
let creditW = 0
walkLineRanges(preparedCredit, 9999, l => { creditW = Math.ceil(l.width) })

// ══════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════
function easeOut(t) {
  const u = 1 - t
  return 1 - u * u * u
}

function syncPool(pool, n, create, parent) {
  while (pool.length < n) {
    const el = create()
    pool.push(el)
    parent.appendChild(el)
  }
  while (pool.length > n) {
    pool.pop().remove()
  }
}

const headlineCache = new Map()
function getHeadlinePrepared(text, font) {
  const key = font + '::' + text
  if (!headlineCache.has(key)) headlineCache.set(key, prepareWithSegments(text, font))
  return headlineCache.get(key)
}

function fitFontSize(text, maxW, pageW, minPx, maxPx, family) {
  let lo = minPx, hi = maxPx, best = lo
  while (lo <= hi) {
    const mid = Math.floor((lo + hi) / 2)
    const font = `700 ${mid}px ${family}`
    const p = getHeadlinePrepared(text, font)
    let breaksMid = false
    walkLineRanges(p, maxW, line => { if (line.end.graphemeIndex !== 0) breaksMid = true })
    if (!breaksMid) { best = mid; lo = mid + 1 }
    else hi = mid - 1
  }
  return best
}

function layoutColumn(prepared, startCursor, region, lineH, rects) {
  let cursor = startCursor
  let top = region.y
  const lines = []
  while (top + lineH <= region.y + region.h) {
    const blocked = getRectIntervalsForBand(rects, top, top + lineH, 0, 0)
    const slots = carveTextLineSlots({ left: region.x, right: region.x + region.w }, blocked)
    if (slots.length === 0) { top += lineH; continue }
    let slot = slots[0]
    for (let i = 1; i < slots.length; i++) {
      if (slots[i].right - slots[i].left > slot.right - slot.left) slot = slots[i]
    }
    const line = layoutNextLine(prepared, cursor, slot.right - slot.left)
    if (!line) break
    lines.push({ x: Math.round(slot.left), y: Math.round(top), text: line.text, width: line.width })
    cursor = line.end
    top += lineH
  }
  return { lines, cursor }
}

// ══════════════════════════════════════════════════════════
// RENDER FRAME
// ══════════════════════════════════════════════════════════
function commitFrame(now) {
  const pw = document.documentElement.clientWidth
  const ph = document.documentElement.clientHeight
  const narrow = pw < 720

  // Spin animation
  let animating = false
  if (spinning) {
    const t = Math.min(1, (now - spinStart) / spinDur)
    angle = spinFrom + (spinTo - spinFrom) * easeOut(t)
    if (t >= 1) { angle = spinTo; spinning = false }
    else animating = true
  }

  // Layout constants
  const gutter = narrow ? Math.round(Math.max(18, pw * 0.06)) : Math.round(Math.max(48, pw * 0.048))
  const colW = narrow ? pw - gutter * 2 : Math.round((pw - gutter * 2 - Math.round(Math.max(24, pw * 0.025))) / 2)
  const centerGap = narrow ? 0 : Math.round(Math.max(24, pw * 0.025))

  // Capybara size & position (square: 144×144)
  const capyW = narrow
    ? Math.round(Math.min(130, pw * 0.28, ph * 0.24))
    : Math.round(Math.min(240, pw * 0.22, ph * 0.38))
  const capyH = Math.round(capyW * CAPY_ASPECT)
  // Default: horizontally centered, vertically centered
  const defaultCapyX = Math.round(pw / 2 - capyW / 2)
  const defaultCapyY = Math.round(ph / 2 - capyH / 2)

  // ── Physics ──────────────────────────────────────────────
  // Capy1: integrate velocity before reading final position
  if (!isDragging) {
    const px = dragCapyX ?? defaultCapyX, py = dragCapyY ?? defaultCapyY
    dragCapyX = px + vel1.x; dragCapyY = py + vel1.y
    vel1.x *= FRIC; vel1.y *= FRIC
    if (dragCapyX < 0)          { dragCapyX = 0;          vel1.x =  Math.abs(vel1.x) * REST }
    if (dragCapyX + capyW > pw) { dragCapyX = pw - capyW; vel1.x = -Math.abs(vel1.x) * REST }
    if (dragCapyY < 0)          { dragCapyY = 0;          vel1.y =  Math.abs(vel1.y) * REST }
    if (dragCapyY + capyH > ph) { dragCapyY = ph - capyH; vel1.y = -Math.abs(vel1.y) * REST }
  }
  // Capy2: init + integrate
  if (capy2X === null) { capy2X = Math.round(pw * 0.28); capy2Y = Math.round(ph * 0.35) }
  if (!isDragging2) {
    capy2X += vel2.x; capy2Y += vel2.y
    vel2.x *= FRIC; vel2.y *= FRIC
    if (capy2X < 0)          { capy2X = 0;          vel2.x =  Math.abs(vel2.x) * REST }
    if (capy2X + capyW > pw) { capy2X = pw - capyW; vel2.x = -Math.abs(vel2.x) * REST }
    if (capy2Y < 0)          { capy2Y = 0;          vel2.y =  Math.abs(vel2.y) * REST }
    if (capy2Y + capyH > ph) { capy2Y = ph - capyH; vel2.y = -Math.abs(vel2.y) * REST }
  }
  // Elastic collision between capy1 and capy2
  {
    const p1x = (dragCapyX ?? defaultCapyX), p1y = (dragCapyY ?? defaultCapyY)
    const _cx1 = p1x + capyW/2, _cy1 = p1y + capyH/2
    const _cx2 = capy2X + capyW/2, _cy2 = capy2Y + capyH/2
    const _cdx = _cx2 - _cx1, _cdy = _cy2 - _cy1
    const _cdist = Math.sqrt(_cdx*_cdx + _cdy*_cdy)
    const _colR = Math.min(capyW, capyH) * 0.46
    if (_cdist < _colR * 2 && _cdist > 0.01) {
      const _nx = _cdx/_cdist, _ny = _cdy/_cdist
      const _dvn = (vel1.x-vel2.x)*_nx + (vel1.y-vel2.y)*_ny
      if (_dvn > 0) {
        const _imp = _dvn * (1 + REST) / 2
        vel1.x -= _imp*_nx; vel1.y -= _imp*_ny
        vel2.x += _imp*_nx; vel2.y += _imp*_ny
        const _sep = (_colR*2 - _cdist)/2 + 1
        if (!isDragging)  { dragCapyX = p1x - _sep*_nx; dragCapyY = p1y - _sep*_ny }
        if (!isDragging2) { capy2X += _sep*_nx; capy2Y += _sep*_ny }
      }
    }
  }
  // Final positions (post-physics)
  const capyX = dragCapyX ?? defaultCapyX
  const capyY = dragCapyY ?? defaultCapyY
  lastCapyX = capyX; lastCapyY = capyY
  lastCapy2X = capy2X; lastCapy2Y = capy2Y

  capyWrap.style.cssText = `left:${capyX}px; top:${capyY}px; width:${capyW}px; height:${capyH}px; position:absolute; z-index:3; cursor:grab; user-select:none;`
  capyWrap.querySelector('.capy-inner').style.transform = `rotate(${angle}rad)`
  capyWrap.querySelector('.capy-inner').style.width = capyW + 'px'
  capyWrap.querySelector('.capy-inner').style.height = capyH + 'px'
  capyWrap.querySelector('svg').style.width = '100%'
  capyWrap.querySelector('svg').style.height = '100%'

  capy2Wrap.style.cssText = `left:${capy2X}px; top:${capy2Y}px; width:${capyW}px; height:${capyH}px; position:absolute; z-index:3; cursor:grab; user-select:none;`
  capy2Wrap.querySelector('.capy-inner').style.width = capyW + 'px'
  capy2Wrap.querySelector('.capy-inner').style.height = capyH + 'px'
  capy2Wrap.querySelector('svg').style.width = '100%'
  capy2Wrap.querySelector('svg').style.height = '100%'

  // Both capybara obstacles (tight 4px padding)
  const PAD = 4
  const capyObs = [
    { x: capyX  - PAD, y: capyY  - PAD, width: capyW + PAD*2, height: capyH + PAD*2 },
    { x: capy2X - PAD, y: capy2Y - PAD, width: capyW + PAD*2, height: capyH + PAD*2 }
  ]

  // Headline
  const hlTop = narrow ? Math.round(Math.max(22, ph * 0.04)) : Math.round(Math.max(52, ph * 0.06))
  const hlMaxW = narrow ? pw - gutter * 2 : pw - gutter * 2
  const hlMinPx = narrow ? Math.max(18, Math.round(pw * 0.028)) : Math.max(22, Math.round(pw * 0.028))
  const hlMaxPx = narrow ? Math.min(44, Math.round(pw * 0.058)) : Math.min(80, Math.round(pw * 0.056))
  const hlPx = fitFontSize(HEADLINE, hlMaxW, pw, hlMinPx, hlMaxPx, HEADLINE_FAMILY)
  const hlFont = `700 ${hlPx}px ${HEADLINE_FAMILY}`
  const hlLH = Math.round(hlPx * 0.88)
  const hlPrepared = getHeadlinePrepared(HEADLINE, hlFont)
  const hlObs = capyObs
  const hlResult = layoutColumn(hlPrepared, { segmentIndex: 0, graphemeIndex: 0 }, { x: gutter, y: hlTop, w: pw - gutter * 2, h: ph }, hlLH, hlObs)

  // Headline DOM
  headlineEl.style.cssText = `left:0; top:0; width:${pw}px; height:${ph}px; font:${hlFont}; line-height:${hlLH}px; position:absolute; margin:0; z-index:1;`
  syncPool(hlPool, hlResult.lines.length, () => {
    const s = document.createElement('span')
    s.className = 'hl-line'
    return s
  }, headlineEl)
  hlResult.lines.forEach((l, i) => {
    const el = hlPool[i]
    el.textContent = l.text
    el.style.cssText = `left:${l.x}px; top:${l.y}px; font:${hlFont}; line-height:${hlLH}px; position:absolute; white-space:pre; color:var(--ink);`
  })

  // Credit
  const hlBottom = hlResult.lines.length
    ? Math.max(...hlResult.lines.map(l => l.y + hlLH))
    : hlTop
  const creditTop = hlBottom + Math.round(Math.max(10, BODY_LH * 0.45))
  creditEl.style.cssText = `left:${gutter + 4}px; top:${creditTop}px; font:11px/14px "Helvetica Neue",Arial,sans-serif; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); position:absolute; white-space:nowrap; z-index:1;`

  // Body columns
  const copyTop = creditTop + 14 + Math.round(Math.max(16, BODY_LH * 0.7))
  const leftReg = { x: gutter, y: copyTop, w: colW, h: ph - copyTop - gutter }
  const rightX = gutter + colW + centerGap
  const rightReg = { x: rightX, y: narrow ? copyTop : hlTop, w: colW, h: ph - (narrow ? copyTop : hlTop) - gutter }

  const leftObs  = capyObs
  const rightObs = capyObs

  const leftR = layoutColumn(preparedBody, { segmentIndex: 0, graphemeIndex: 0 }, leftReg, BODY_LH, leftObs)
  const rightR = narrow ? { lines: [] } : layoutColumn(preparedBody, leftR.cursor, rightReg, BODY_LH, rightObs)

  const allLines = [...leftR.lines, ...rightR.lines]
  syncPool(bodyPool, allLines.length, () => {
    const s = document.createElement('span')
    s.className = 'body-line'
    return s
  }, stage)
  allLines.forEach((l, i) => {
    const el = bodyPool[i]
    el.textContent = l.text
    el.style.cssText = `left:${l.x}px; top:${l.y}px; font:${BODY_FONT}; line-height:${BODY_LH}px; position:absolute; white-space:pre; z-index:1;`
  })

  const hasPhysics = Math.abs(vel1.x) + Math.abs(vel1.y) + Math.abs(vel2.x) + Math.abs(vel2.y) > 0.05
  return animating || hasPhysics
}

// ══════════════════════════════════════════════════════════
// EVENTS
// ══════════════════════════════════════════════════════════
function scheduleRender() {
  if (scheduled) return
  scheduled = true
  requestAnimationFrame(now => {
    scheduled = false
    if (commitFrame(now)) scheduleRender()
  })
}

// Drag — mouse
capyWrap.addEventListener('mousedown', (e) => {
  isDragging = true
  didDrag = false
  dragOffX = e.clientX - lastCapyX
  dragOffY = e.clientY - lastCapyY
  e.preventDefault()
})
document.addEventListener('mousemove', (e) => {
  if (!isDragging) return
  didDrag = true
  prevCapyX = dragCapyX ?? lastCapyX
  prevCapyY = dragCapyY ?? lastCapyY
  dragCapyX = e.clientX - dragOffX
  dragCapyY = e.clientY - dragOffY
  scheduleRender()
})
document.addEventListener('mouseup', () => {
  if (isDragging2) {
    isDragging2 = false
    vel2.x = (capy2X - prevCapy2X) * 0.85
    vel2.y = (capy2Y - prevCapy2Y) * 0.85
    scheduleRender()
    return
  }
  if (!isDragging) return
  isDragging = false
  if (!didDrag) {
    const dir = Math.random() < 0.5 ? 1 : -1
    spinFrom = angle; spinTo = angle + dir * Math.PI
    spinStart = performance.now(); spinDur = 800; spinning = true
    scheduleRender()
  } else {
    vel1.x = (dragCapyX - prevCapyX) * 0.85
    vel1.y = (dragCapyY - prevCapyY) * 0.85
    scheduleRender()
  }
})

// Capy2 drag
capy2Wrap.addEventListener('mousedown', (e) => {
  isDragging2 = true
  dragOffX2 = e.clientX - lastCapy2X; dragOffY2 = e.clientY - lastCapy2Y
  vel2.x = 0; vel2.y = 0
  e.preventDefault()
})
document.addEventListener('mousemove', (e) => {
  if (isDragging2) {
    prevCapy2X = capy2X; prevCapy2Y = capy2Y
    capy2X = e.clientX - dragOffX2; capy2Y = e.clientY - dragOffY2
    scheduleRender()
  }
})

// Drag — touch
capyWrap.addEventListener('touchstart', (e) => {
  const t = e.touches[0]
  isDragging = true; didDrag = false
  dragOffX = t.clientX - lastCapyX
  dragOffY = t.clientY - lastCapyY
  e.preventDefault()
}, { passive: false })
document.addEventListener('touchmove', (e) => {
  if (!isDragging) return
  const t = e.touches[0]
  didDrag = true
  dragCapyX = t.clientX - dragOffX
  dragCapyY = t.clientY - dragOffY
  scheduleRender()
}, { passive: true })
document.addEventListener('touchend', () => { isDragging = false })

window.addEventListener('resize', () => {
  dragCapyX = null; dragCapyY = null
  capy2X = null; capy2Y = null
  vel1.x = 0; vel1.y = 0
  vel2.x = 2.4; vel2.y = 1.6
  scheduleRender()
})

// Init
commitFrame(performance.now())
</script>
</body>
</html>
